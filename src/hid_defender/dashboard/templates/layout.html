<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HID Defender Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <!-- Modern premium fonts loaded in styles.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <!-- Chart.js for Advanced Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
<div class="dashboard-container">
    <!-- Glassmorphic Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>🛡️ Defender</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#dashboard" class="nav-item active" data-section="dashboard">📊 Dashboard</a>
            <a href="#devices" class="nav-item" data-section="devices">📱 Devices</a>
            <a href="#alerts" class="nav-item" data-section="alerts">⚠️ Alerts</a>
            <a href="#logs" class="nav-item" data-section="logs">📋 Logs</a>
            <a href="#trusted" class="nav-item" data-section="trusted">🔐 Trusted Devices</a>
            <a href="#tests" class="nav-item" data-section="tests">🧪 Test Cases</a>
            <a href="#settings" class="nav-item" data-section="settings">⚙️ Settings</a>
        </nav>
    </aside>
    
    <!-- Main Content Panel -->
    <div class="main-content">
        <header>
            <div class="header-left">
                <h1>HID Detection & Alert System</h1>
                <p id="status-time"><span class="status-active"></span>HID Engine: <b style="color: #10b981;">Active</b></p>
            </div>
            <div class="header-right">
                <button id="refresh-btn" class="button button-secondary">🔄 Refresh</button>
                <button id="simulate-attack-btn" class="button danger-btn" style="background: var(--danger); color: white; box-shadow: 0 4px 15px var(--danger-glow);">🚨 Simulate Attack</button>
            </div>
        </header>
        
        <main>
            {% block content %}{% endblock %}
        </main>
        
        <footer>
            <p>HID Defender v1.0 — Real-time continuous monitoring</p>
        </footer>
    </div>
</div>

<!-- Simulation Modal -->
<div id="simulation-modal" class="modal-overlay hidden">
    <div class="modal-content glass-panel">
        <div class="modal-header">
            <h2>🚨 Attack Simulation in Progress</h2>
        </div>
        <div class="modal-body" id="simulation-body">
            <!-- Simulated attacks will appear here -->
        </div>
        <div class="modal-footer">
            <button id="close-simulation-btn" class="button hidden" style="width: 100%;">View Logs</button>
        </div>
    </div>
</div>

<!-- Live Threat Toast Container -->
<div id="toast-container" style="
    position: fixed; bottom: 1.5rem; right: 1.5rem;
    display: flex; flex-direction: column; gap: 0.75rem;
    z-index: 9999; pointer-events: none; max-width: 380px;
"></div>

<!-- Threat alert audio (base64 beep) -->
<audio id="alert-beep" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<style>
.toast-alert {
    background: linear-gradient(135deg, #1e0a0a 0%, #2d0f0f 100%);
    border: 1px solid #ef444466;
    border-left: 4px solid #ef4444;
    border-radius: 12px;
    padding: 1rem 1.2rem;
    color: #e2e8f0;
    box-shadow: 0 8px 32px rgba(239,68,68,0.35), 0 0 0 1px rgba(239,68,68,0.1);
    pointer-events: all;
    animation: toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    position: relative;
    overflow: hidden;
}
.toast-alert::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, #ef4444, #f97316);
    animation: toastProgress 6s linear forwards;
}
@keyframes toastIn {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
}
@keyframes toastOut {
    from { transform: translateX(0);    opacity: 1; }
    to   { transform: translateX(120%); opacity: 0; }
}
@keyframes toastProgress {
    from { width: 100%; }
    to   { width: 0%; }
}
.toast-title { font-weight: 700; font-size: 0.9rem; color: #ef4444; margin-bottom: 0.3rem; }
.toast-device { font-size: 0.82rem; color: #94a3b8; margin-bottom: 0.2rem; }
.toast-reason { font-size: 0.78rem; color: #f59e0b; font-family: 'JetBrains Mono', monospace; }
.toast-close {
    position: absolute; top: 0.5rem; right: 0.7rem;
    background: none; border: none; color: #64748b;
    cursor: pointer; font-size: 1rem; line-height: 1;
}
.toast-close:hover { color: #ef4444; }
.monitor-indicator {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.75rem; color: #22c55e;
    background: #22c55e11; border: 1px solid #22c55e33;
    border-radius: 20px; padding: 3px 10px;
    margin-left: 0.5rem;
}
.monitor-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #22c55e;
    animation: pulse 1.5s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.8); }
}
</style>

<script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
